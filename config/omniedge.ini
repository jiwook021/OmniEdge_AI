; ===========================================================================
; OmniEdge_AI — Master Configuration
; ===========================================================================
;
; The daemon reads this file at startup.  Disabled modules are completely
; skipped — no process spawned, no VRAM allocated.
;
; TESTING ORDER (enable one at a time, confirm stability before the next):
;
;   Step  Module              GPU?   VRAM (approx)   Validates
;   ────  ──────────────────  ─────  ─────────────   ──────────────────────
;    1    video_ingest         No       0 MB          GStreamer + SHM + ZMQ
;    2    audio_ingest         No       0 MB          PulseAudio + SHM + ZMQ
;    3    websocket_bridge     No       0 MB          uWebSockets + ZMQ relay
;    4    background_blur     Yes     500 MB          YOLOv8n-seg inference
;    5    tts                 Yes     100 MB          Kokoro ONNX (Gemma 4 E4B)
;    6    conversation_model  Yes    3500 MB          Qwen2.5-Omni-7B (AWQ)
;    7    face_recognition    Yes     350 MB          SCRFD + AdaFace ONNX
;    8    super_resolution    Yes    1500 MB          BasicVSR++ temporal
;    9    image_transform     Yes    4000 MB          SD + ControlNet
;
;   RTX PRO 3000: 12,288 MiB total — safe cap 11,264 MiB (~1 GB headroom)
;
; ===========================================================================

; ===========================================================================
; §1  MODULE TOGGLES
; ===========================================================================

[modules]
; ── Always-on infrastructure (no GPU) ─────────────────────────────────────
video_ingest       = 1
audio_ingest       = 1
websocket_bridge   = 1

; ── Always-on GPU modules ─────────────────────────────────────────────────
background_blur    = 1  ; YOLOv8n-seg instance segmentation    (~500 MB)

; ── Four-mode architecture ────────────────────────────────────────────────
conversation_model = 1  ; Qwen2.5-Omni-7B (4-bit AWQ)        (~3500 MB)
tts                = 1  ; Kokoro TTS — Gemma 4 E4B companion   (~100 MB)
audio_denoise      = 1  ; DTLN audio denoiser                   (~50 MB)
super_resolution   = 1  ; BasicVSR++ temporal video enhancer   (~1500 MB)
image_transform    = 1  ; Stable Diffusion + ControlNet        (~4000 MB)

; ── Legacy separate modules (backward compatibility) ──────────────────────
stt                = 1  ; Whisper TensorRT                     (~1500 MB)
face_recognition   = 1  ; SCRFD + AdaFace ONNX                  (~350 MB)
llm                = 1  ; Qwen 2.5 TRT-LLM standalone          (~3440 MB)
video_denoise      = 1  ; BasicVSR++ legacy alias               (~1500 MB)

; ===========================================================================
; §2  NETWORK — Ports and WebSocket
; ===========================================================================

[ports]
; ZMQ PUB ports — must match config/omniedge_config.yaml
video_ingest       = 5555
audio_ingest       = 5556
llm                = 5561
vlm                = 5562
stt                = 5563
tts                = 5565
face_recognition   = 5566
background_blur    = 5567
video_denoise      = 5568
audio_denoise      = 5569
websocket_bridge   = 5570
daemon             = 5571
conversation_model = 5572
super_resolution   = 5573
image_transform    = 5574
face_filter        = 5575
ws_http            = 9001

; ===========================================================================
; §3  DAEMON — Process lifecycle and watchdog
; ===========================================================================

[daemon]
watchdog_poll_ms       = 1000   ; Health-check polling interval (ms)
module_ready_timeout_s = 30     ; Max wait for module_ready after spawn (s)
max_module_restarts    = 5      ; Total restart budget before permanent disable
stop_grace_period_s    = 5      ; SIGTERM → SIGKILL grace period (s)

[heartbeat]
interval_ms = 1000   ; How often each module publishes a heartbeat (ms)
timeout_ms  = 30000  ; Silence before module is declared dead (ms); covers TRT-LLM init
ttl_ms      = 10000  ; Max heartbeat age before considered stale (ms)

; ===========================================================================
; §4  TIMEOUTS — Per-module operation limits
; ===========================================================================

[timeouts]
llm_generation_s      = 60   ; Max wait for a complete LLM response
image_transform_s     = 120  ; Stable Diffusion inference timeout
vad_silence_ms        = 800  ; Silence before end-of-utterance; lower = more responsive

; ===========================================================================
; §5  MODULE TUNING — Generation, prompt, session, and CV parameters
; ===========================================================================

[generation]
; Defaults used when the frontend omits generation_params from conversation_prompt.
temperature = 0.7   ; Sampling temperature (0.0 – 2.0)
top_p       = 0.9   ; Nucleus sampling threshold (0.0 – 1.0)
max_tokens  = 2048  ; Maximum tokens to generate (64 – 8192)

[prompt]
max_context_tokens     = 4096  ; Total context window (tokens)
system_prompt_tokens   = 200   ; Reserved for system prompt
dynamic_context_tokens = 100   ; Face identity, scene description
max_user_turn_tokens   = 500   ; Max tokens per user turn in history
generation_headroom    = 500   ; Reserved for LLM generation output

[session]
periodic_save_interval_s = 30  ; Auto-save interval (s)
max_staleness_s          = 60  ; Discard restored sessions older than this (s)

[cv]
face_recognition_threshold          = 0.45  ; Cosine similarity (0.0–1.0)
segmentation_confidence_threshold   = 0.5   ; YOLOv8-seg confidence floor
jpeg_encoding_quality               = 85    ; Blurred frame JPEG quality (0–100)
background_blur_sigma               = 25.0  ; Gaussian blur sigma
face_detection_frame_subsample      = 3     ; Process every Nth frame for faces

; ===========================================================================
; §6  PROTECTION — Memory, VRAM, and crash recovery
; ===========================================================================

[memory_limits_mb]
; Host RSS limits — watchdog SIGKILLs modules exceeding these.  0 = disabled.
; Always-on
video_ingest       = 512
audio_ingest       = 256
websocket_bridge   = 256
background_blur    = 1024
; Four-mode
conversation_model = 8192
tts                = 1024
audio_denoise      = 512
super_resolution   = 6144
image_transform    = 8192
; Legacy
stt                = 2048
face_recognition   = 1024
llm                = 8192
video_denoise      = 6144

[vram_limits]
max_total_vram_mb          = 11264  ; Hard cap enforced by VramGate (MiB)
vram_check_interval_ms     = 2000   ; cudaMemGetInfo probe interval (ms)
vram_warning_threshold_mb  = 10000  ; Log warning above this (MiB)
vram_critical_threshold_mb = 10500  ; Evict lowest-priority modules above this (MiB)
pressure_warning_free_mb   = 1500   ; Free VRAM below this → pressure level 1 (MiB)
pressure_critical_free_mb  = 500    ; Free VRAM below this → pressure level 2 (MiB)

; ===========================================================================
; §6a  VRAM TIERS — GPU tier selection thresholds (MiB of usable VRAM)
; ===========================================================================

[vram_tiers]
ultra_threshold_mb     = 15500 ; kUltra:    >= this usable VRAM (> 16 GB cards)
standard_threshold_mb  = 11000 ; kStandard: >= this (12 GB — RTX PRO 3000 target)
balanced_threshold_mb  = 7000  ; kBalanced: >= this (8 GB cards)
headroom_mb            = 500   ; Reserved for OS + WDDM/WSL2 fragmentation

; ===========================================================================
; §6b  VRAM BUDGETS — Per-module GPU memory budgets (MiB)
;
; Keys match module names used in [modules] and VramTracker registration.
; Model-variant keys (qwen_omni_7b, gemma_e4b, etc.) are used by the daemon
; for dynamic model switching and VramGate acquisition.
; ===========================================================================

[vram_budgets]
; ── Always-on modules (resident across all modes) ─────────────────────────
background_blur                = 250   ; YOLOv8-seg TRT engine (416×416 input)
face_recognition               = 500   ; Maximum face recog budget cap
; ── Face recognition model variants ───────────────────────────────────────
face_recog_scrfd_adaface101    = 350   ; SCRFD-10G + AdaFace IR-101
face_recog_scrfd_adaface50     = 250   ; SCRFD-10G + AdaFace IR-50
face_recog_scrfd_mobilefacenet = 50    ; SCRFD-2.5G + MobileFaceNet
; ── Conversation mode models (mutually exclusive within mode) ─────────────
qwen_omni_7b                   = 3500  ; Qwen2.5-Omni-7B 4-bit GPTQ/AWQ
qwen_omni_3b                   = 2000  ; Qwen2.5-Omni-3B
gemma_e4b                      = 3000  ; Gemma 4 E4B — native audio+image input
tts                            = 100   ; TTS ONNX (Kokoro 82M, Dynamic INT8)
; ── Legacy separate-module budgets ────────────────────────────────────────
llm                            = 3440  ; Standalone LLM (Qwen 2.5 7B TRT-LLM) — deprecated
stt                            = 1500  ; Standalone STT encoder+decoder — deprecated
; ── Super Resolution mode ─────────────────────────────────────────────────
super_resolution               = 1500  ; BasicVSR++ ONNX temporal video enhancement
; ── Image Transform mode ──────────────────────────────────────────────────
image_transform                = 4000  ; Stable Diffusion + ControlNet/IP-Adapter
; ── CV extension (always-on, lightweight) ─────────────────────────────────
face_filter                    = 100   ; FaceMesh V2 ONNX + texture buffers
; ── SAM2 (on-demand, user-triggered segmentation) ─────────────────────────
sam2                           = 800   ; SAM2 Tiny ONNX image encoder + mask decoder
; ── Audio enhancement (optional toggle in Conversation mode) ──────────────
audio_denoise                  = 50    ; DTLN two-stage audio denoiser

; ===========================================================================
; §6c  VRAM INFERENCE HEADROOM — Minimum free VRAM before inference (MiB)
;
; Conservative estimates of peak activation memory beyond loaded model
; weights (workspace, KV cache growth, intermediate tensors).
; Used by ensureVramAvailableMiB() pre-flight checks in hot-path code.
; ===========================================================================

[vram_inference_headroom]
background_blur        = 64    ; YOLOv8-Seg TRT workspace (416×416)
face_recognition       = 128   ; SCRFD + AdaFace detection workspace
qwen_omni_7b           = 512   ; Unified STT+LLM+TTS activations + KV cache growth
qwen_omni_3b           = 300   ; Smaller model, less activation memory
gemma_e4b              = 400   ; Audio+image encoder activations + decoder workspace
tts                    = 64    ; ONNX Runtime intermediate tensors (Kokoro)
llm                    = 256   ; Standalone LLM KV cache growth + TRT workspace
stt                    = 200   ; Standalone STT encoder+decoder activations
super_resolution       = 256   ; Temporal-window activations
image_transform        = 512   ; Diffusion U-Net + ControlNet activations
face_filter            = 64    ; FaceMesh V2 ONNX workspace (192×192 input)
sam2                   = 256   ; SAM2 ViT encoder activations + mask decoder
audio_denoise          = 32    ; DTLN two-stage ONNX workspace

; ===========================================================================
; §6d  INTERACTION PROFILES — Priority maps for each GPU mode
;
; Priority scale: 0 = evict first, 5 = never evict.
; Within the same priority, largest VRAM budget is evicted first.
; Always-on modules (background_blur, face_recognition) should be 5
; in ALL profiles so they are never evicted.
; ===========================================================================

[profile_conversation]
conversation_model     = 5     ; Never evict — active conversation model
tts                    = 4     ; Spawned alongside Gemma 4 E4B only
audio_denoise          = 1     ; Optional toggle for speech cleanup
background_blur        = 5     ; Always-on — never evict
face_recognition       = 5     ; Always-on — never evict
super_resolution       = 0     ; Evict — not active in conversation mode
image_transform        = 0     ; Evict — not active in conversation mode
sam2                   = 2     ; On-demand segmentation — keep if VRAM allows
llm                    = 0     ; Legacy — evicted
stt                    = 0     ; Legacy — evicted
video_denoise          = 0     ; Legacy — evicted

[profile_super_resolution]
super_resolution       = 5     ; Never evict — active mode
background_blur        = 5     ; Always-on — never evict
face_recognition       = 5     ; Always-on — never evict
conversation_model     = 0     ; Evict — killed on mode switch
tts                    = 0     ; Evict — not active in SR mode
audio_denoise          = 0     ; Evict — not active in SR mode
image_transform        = 0     ; Evict — not active in SR mode
sam2                   = 0     ; Evict — not active in SR mode
llm                    = 0     ; Legacy — evicted
stt                    = 0     ; Legacy — evicted

[profile_image_transform]
image_transform        = 5     ; Never evict — active mode
background_blur        = 5     ; Always-on — never evict
face_recognition       = 5     ; Always-on — never evict
conversation_model     = 0     ; Evict — killed on mode switch
super_resolution       = 0     ; Evict — not active in IT mode
tts                    = 0     ; Evict — not active in IT mode
audio_denoise          = 0     ; Evict — not active in IT mode
sam2                   = 0     ; Evict — not active in IT mode
llm                    = 0     ; Legacy — evicted
stt                    = 0     ; Legacy — evicted

[crash_protection]
max_segfault_restarts    = 1     ; SIGSEGV/SIGBUS restarts before permanent disable
memory_check_interval_ms = 2000  ; /proc/<pid>/statm polling interval (ms)
max_unresponsive_checks  = 10    ; Consecutive failed health checks before kill
kill_process_group       = 1     ; Kill entire process group, not just main PID

; ===========================================================================
; §7  LOGGING
; ===========================================================================

[logging]
; Valid: trace, debug, info, warn, err, critical, off
; "trace" requires SPDLOG_ACTIVE_LEVEL=0 at compile time.
default = debug

; Per-module overrides (uncomment to customize):
; video_ingest     = info
; audio_ingest     = info
; websocket_bridge = info
; background_blur  = info
; tts              = info
; stt              = info
; face_recognition = info
; llm              = debug
; video_denoise    = info
; audio_denoise    = info
; orchestrator     = info
