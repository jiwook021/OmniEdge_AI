; ===========================================================================
; OmniEdge_AI — Master Configuration
; ===========================================================================
;
; The daemon reads this file at startup.  Disabled modules are completely
; skipped — no process spawned, no VRAM allocated.
;
; TESTING ORDER (enable one at a time, confirm stability before the next):
;
;   Step  Module              GPU?   VRAM (approx)   Validates
;   ────  ──────────────────  ─────  ─────────────   ──────────────────────
;    1    video_ingest         No       0 MB          GStreamer + SHM + ZMQ
;    2    audio_ingest         No       0 MB          PulseAudio + SHM + ZMQ
;    3    websocket_bridge     No       0 MB          uWebSockets + ZMQ relay
;    4    background_blur     Yes     500 MB          YOLOv8n-seg inference
;    5    tts                 Yes     100 MB          Kokoro ONNX (Gemma 4 E4B)
;    6    conversation_model  Yes    3500 MB          Qwen2.5-Omni-7B (AWQ)
;    7    face_recognition    Yes     350 MB          SCRFD + AuraFace v1 ONNX
;
;   RTX PRO 3000: 12,288 MiB total — safe cap 11,264 MiB (~1 GB headroom)
;
; ===========================================================================

; ===========================================================================
; §0  PATHS — Filesystem roots
; ===========================================================================

[paths]
; Root directory for all model files.  Relative model paths in per-module
; sections (e.g. [tts] onnx_model) are resolved against this root.
models_root = /opt/omniedge/models

; ===========================================================================
; §1  MODULE TOGGLES
; ===========================================================================

[modules]
; ── Always-on infrastructure (no GPU) ─────────────────────────────────────
video_ingest       = 1
audio_ingest       = 1
screen_ingest      = 0  ; Screen capture from Windows DXGI agent    (0 MB, CPU-only, Windows only)
websocket_bridge   = 1

; ── Always-on GPU modules ─────────────────────────────────────────────────
background_blur    = 1  ; YOLOv8n-seg instance segmentation    (~500 MB)

; ── Security camera mode ─────────────────────────────────────────────
security_camera    = 1  ; YOLO detection + NVENC recording      (~250 MB)

; ── Four-mode architecture ────────────────────────────────────────────────
conversation_model = 1  ; Qwen2.5-Omni-7B (4-bit AWQ)        (~3500 MB)
tts                = 1  ; Kokoro TTS — Gemma 4 E4B companion   (~100 MB)
audio_denoise      = 1  ; DTLN audio denoiser                   (~50 MB)

; ── Beauty mode (real-time face beautification) ────────────────────────────
beauty             = 1  ; FaceMesh V2 + bilateral filter + TPS warp (~250 MB)

; ── CV extensions ──────────────────────────────────────────────────────────
face_recognition   = 1  ; SCRFD + AuraFace v1 ONNX              (~350 MB)

; ===========================================================================
; §2  NETWORK — Ports and WebSocket
; ===========================================================================

[ports]
; ZMQ PUB ports — must match config/omniedge_config.yaml
video_ingest       = 5555
audio_ingest       = 5556
llm                = 5561
stt                = 5563
tts                = 5565
face_recognition   = 5566
background_blur    = 5567
video_denoise      = 5568
audio_denoise      = 5569
websocket_bridge   = 5570
daemon             = 5571
conversation_model = 5572
face_filter        = 5575
sam2               = 5576
screen_ingest      = 5577
security_camera    = 5578
beauty             = 5579
ws_http            = 9001

; ===========================================================================
; §3  DAEMON — Process lifecycle and watchdog
; ===========================================================================

[daemon]
; Boot mode: "simple_llm" (text-only, fast) or "full_conversation" (all A/V)
; The frontend can switch modes at runtime via the mode_switch ZMQ command.
default_mode           = simple_llm
watchdog_poll_ms       = 1000   ; Health-check polling interval (ms)
module_ready_timeout_s = 180    ; Max wait for module_ready after spawn (s)
max_module_restarts    = 5      ; Total restart budget before permanent disable
stop_grace_period_s    = 5      ; SIGTERM → SIGKILL grace period (s)
restart_base_backoff_ms = 500   ; Initial backoff between restart attempts (ms)
restart_max_backoff_ms  = 30000 ; Max backoff between restart attempts (ms)
barge_in_enabled        = true  ; FSM: allow user speech to interrupt TTS
; Fallback launch order used when default_mode is not present in [boot_modes].
launch_order           = video_ingest,audio_ingest,conversation_model,background_blur
; ZMQ SUB endpoints the daemon connects to (CSV of ipc:// / tcp:// URIs).
; Blank = use the defaults hardcoded in modules/nodes/orchestrator/src/main.cpp.
zmq_sub                =

; Per-mode launch order. Each key is a mode name; value is CSV of module names
; spawned at boot when [daemon] default_mode = <key>.
[boot_modes]
simple_llm        = conversation_model
full_conversation = video_ingest,audio_ingest,conversation_model,background_blur

[heartbeat]
interval_ms = 1000   ; How often each module publishes a heartbeat (ms)
timeout_ms  = 30000  ; Silence before module is declared dead (ms); covers TRT-LLM init
ttl_ms      = 10000  ; Max heartbeat age before considered stale (ms)

; ===========================================================================
; §4  TIMEOUTS — Per-module operation limits
; ===========================================================================

[timeouts]
llm_generation_s      = 60   ; Max wait for a complete LLM response
vad_silence_ms        = 800  ; Silence before end-of-utterance; lower = more responsive

; ===========================================================================
; §5  MODULE TUNING — Generation, prompt, session, and CV parameters
; ===========================================================================

[generation]
; Defaults used when the frontend omits generation_params from conversation_prompt.
temperature = 0.7   ; Sampling temperature (0.0 – 2.0)
top_p       = 0.9   ; Nucleus sampling threshold (0.0 – 1.0)
max_tokens  = 2048  ; Maximum tokens to generate (64 – 8192)

[prompt]
max_context_tokens     = 4096  ; Total context window (tokens)
system_prompt_tokens   = 200   ; Reserved for system prompt
dynamic_context_tokens = 100   ; Face identity, scene description
max_user_turn_tokens   = 500   ; Max tokens per user turn in history
generation_headroom    = 500   ; Reserved for LLM generation output

[session]
periodic_save_interval_s = 30  ; Auto-save interval (s)
max_staleness_s          = 60  ; Discard restored sessions older than this (s)

[cv]
face_recognition_threshold          = 0.45  ; Cosine similarity (0.0–1.0)
segmentation_confidence_threshold   = 0.5   ; YOLOv8-seg confidence floor
jpeg_encoding_quality               = 85    ; Blurred frame JPEG quality (0–100)
background_blur_sigma               = 25.0  ; Gaussian blur sigma
face_detection_frame_subsample      = 3     ; Process every Nth frame for faces

; ---------------------------------------------------------------------------
; Face recognition model — AuraFace v1 (glintr100, Apache 2.0, commercial OK).
; On first run the recognizer.onnx is auto-downloaded from Hugging Face into
; ${models_root}/face_recog/ via fetchHfModel().  SCRFD detector is still
; fetched by scripts/helpers/download_face_models.py on install.
; ---------------------------------------------------------------------------
[face_recognition]
; Model-fetch (Phase 8, read directly by OnnxFaceRecogInferencer::loadModel)
model_repo            = fal/AuraFace-v1
model_file            = glintr100.onnx
auto_download         = 1
cache_dir             = ${models_root}/face_recog
; Node-level knobs (read by FaceRecognitionNode)
model_pack_path       = face_models/scrfd_auraface
shm_input             = /oe.vid.ingest
recognition_threshold = 0.45
faces_db              = ./data/known_faces.sqlite
frame_subsample       = 3
cuda_stream_priority  = 0

; ---------------------------------------------------------------------------
; Background blur (YOLOv8n-seg TRT FP16 engine).
; zmq_pub_port is read from [ports] background_blur.
; ---------------------------------------------------------------------------
[background_blur]
engine_path          = trt_engines/yolov8n-seg.engine
input_size           = 416
shm_input            = /oe.vid.ingest
shm_output           = /oe.cv.blur.jpeg
shm_output_bgr       = /oe.cv.blur.bgr
input_topic          = video_frame
jpeg_quality         = 85
blur_kernel_size     = 51
blur_sigma           = 25.0
cuda_stream_priority = 0
output_format        = jpeg

; ---------------------------------------------------------------------------
; Face filter (MediaPipe FaceMesh V2 ONNX + filter asset manifest).
; zmq_pub_port is read from [ports] face_filter.
; ---------------------------------------------------------------------------
[face_filter]
model_path           = facemesh/face_landmarks_detector.onnx
filter_manifest      = assets/filters/manifest.json
shm_input            = /oe.vid.ingest
shm_output           = /oe.cv.facefilter.jpeg
jpeg_quality         = 85
active_filter        =
enabled              = 0
cuda_stream_priority = 0

; ---------------------------------------------------------------------------
; SAM2 — interactive segmentation (two-stage ONNX: encoder + decoder).
; zmq_pub_port is read from [ports] sam2.
; ---------------------------------------------------------------------------
[sam2]
encoder_model        = sam2/sam2_hiera_tiny_encoder.onnx
decoder_model        = sam2/sam2_hiera_tiny_decoder.onnx
shm_input            = /oe.vid.ingest
shm_output           = /oe.cv.sam2.mask
jpeg_quality         = 90
enabled              = 0
cuda_stream_priority = 0

; ---------------------------------------------------------------------------
; Video denoise (BasicVSR++ temporal ONNX).
; zmq_pub_port is read from [ports] video_denoise.
; ---------------------------------------------------------------------------
[video_denoise]
onnx_model           = basicvsrpp/basicvsrpp_denoise.onnx
shm_input            = /oe.vid.ingest
shm_output           = /oe.vid.denoise
temporal_window      = 5
cuda_stream_priority = -1

; ---------------------------------------------------------------------------
; Security camera (YOLOX-Nano ONNX detection + NVENC recording).
; target_classes is comma-separated.
; zmq_pub_port is read from [ports] security_camera.
; ---------------------------------------------------------------------------
[security_camera]
engine_path           = security/yolox_nano.onnx
shm_input             = /oe.vid.ingest
shm_output            = /oe.cv.security.jpeg
jpeg_quality          = 85
confidence_threshold  = 0.5
detection_interval_ms = 100
event_cooldown_ms     = 3000
recording_dir         = recordings/
segment_duration_min  = 5
recording_fps         = 15
recording_bitrate     = 2000000
target_classes        = person,backpack,suitcase

; ---------------------------------------------------------------------------
; Beauty (MediaPipe FaceMesh V2 ONNX + bilateral filter + TPS warp).
; zmq_pub_port is read from [ports] beauty.
; ---------------------------------------------------------------------------
[beauty]
model_path    = facemesh/face_landmarks_detector.onnx
shm_input     = /oe.vid.ingest
shm_output    = /oe.cv.beauty.jpeg
jpeg_quality  = 85
enabled       = 1

; ---------------------------------------------------------------------------
; Video ingest (V4L2 → SHM).  zmq_pub_port is read from [ports] video_ingest.
; ---------------------------------------------------------------------------
[video_ingest]
v4l2_device  = /dev/video0
frame_width  = 1920
frame_height = 1080
zmq_sndhwm   = 2
shm_input    = /oe.vid.ingest

; ---------------------------------------------------------------------------
; Audio ingest (PulseAudio/ALSA or TCP from Windows host).
; VAD parameters use `vad_*` prefix (flattened sub-section).
; zmq_pub_port is read from [ports] audio_ingest.
; ---------------------------------------------------------------------------
[audio_ingest]
audio_source             = auto
windows_host_ip          = 172.17.0.1
tcp_port                 = 5001
sample_rate_hz           = 16000
chunk_samples            = 512
zmq_sndhwm               = 4
vad_model_path           = vad/silero_vad.onnx
vad_speech_threshold     = 0.5
vad_silence_duration_ms  = 800

; ---------------------------------------------------------------------------
; Screen ingest (TCP from Windows oe_screen_capture.exe).
; zmq_pub_port is read from [ports] screen_ingest.
; ---------------------------------------------------------------------------
[screen_ingest]
windows_host_ip    = host.docker.internal
tcp_port           = 5002
health_timeout_sec = 5
; Path to Windows DXGI capture agent on host (optional). Blank = disabled.
screen_capture_exe =

; ---------------------------------------------------------------------------
; Audio denoise (DTLN two-stage ONNX).  Paths resolved against [paths]
; models_root; zmq_pub_port is read from [ports] audio_denoise.
; ---------------------------------------------------------------------------
[audio_denoise]
model_stage1         = dtln/dtln_1.onnx
model_stage2         = dtln/dtln_2.onnx
shm_input            = /oe.aud.ingest
shm_output           = /oe.aud.denoise
cuda_stream_priority = 0

; ---------------------------------------------------------------------------
; WebSocket bridge (uWebSockets HTTP/WS server).
; zmq_pub_port is read from [ports] websocket_bridge (5570);
; frontend HTTP port is [ports] ws_http (9001).
; ---------------------------------------------------------------------------
[websocket_bridge]
frontend_dir = /opt/omniedge/share/frontend
ws_port      = 8080

; ---------------------------------------------------------------------------
; Text-to-Speech (Kokoro v1.0 INT8, 82M param ONNX).  Paths resolved against
; [paths] models_root; zmq_pub_port is read from [ports] tts.
; ---------------------------------------------------------------------------
[tts]
onnx_model           = kokoro-onnx/onnx/model_int8.onnx
voice_dir            = kokoro/voices
default_voice        = af_heart
speed                = 1.0
shm_output           = /oe.aud.tts
cuda_stream_priority = 0

; ===========================================================================
; §6  PROTECTION — Memory, VRAM, and crash recovery
; ===========================================================================

[memory_limits_mb]
; Host RSS limits — watchdog SIGKILLs modules exceeding these.  0 = disabled.
; Always-on
video_ingest       = 512
audio_ingest       = 256
screen_ingest      = 256
websocket_bridge   = 256
background_blur    = 1024
; Security camera
security_camera    = 1024
; Four-mode
conversation_model = 8192
tts                = 1024
audio_denoise      = 512
face_recognition   = 1024

[vram_limits]
max_total_vram_mb          = 11264  ; Hard cap enforced by VramGate (MiB)
vram_check_interval_ms     = 2000   ; cudaMemGetInfo probe interval (ms)
vram_warning_threshold_mb  = 10000  ; Log warning above this (MiB)
vram_critical_threshold_mb = 10500  ; Evict lowest-priority modules above this (MiB)
pressure_warning_free_mb   = 1500   ; Free VRAM below this → pressure level 1 (MiB)
pressure_critical_free_mb  = 500    ; Free VRAM below this → pressure level 2 (MiB)

; ===========================================================================
; §6a  VRAM TIERS — GPU tier selection thresholds (MiB of usable VRAM)
; ===========================================================================

[vram_tiers]
ultra_threshold_mb     = 15500 ; kUltra:    >= this usable VRAM (> 16 GB cards)
standard_threshold_mb  = 11000 ; kStandard: >= this (12 GB — RTX PRO 3000 target)
balanced_threshold_mb  = 7000  ; kBalanced: >= this (8 GB cards)
headroom_mb            = 500   ; Reserved for OS + WDDM/WSL2 fragmentation

; ===========================================================================
; §6b  VRAM BUDGETS — Per-module GPU memory budgets (MiB)
;
; Keys match module names used in [modules] and VramTracker registration.
; Model-variant keys (qwen_omni_7b, gemma_e4b, etc.) are used by the daemon
; for dynamic model switching and VramGate acquisition.
; ===========================================================================

[vram_budgets]
; ── Always-on modules (resident across all modes) ─────────────────────────
background_blur                = 250   ; YOLOv8-seg TRT engine (416×416 input)
face_recognition               = 500   ; Maximum face recog budget cap
; ── Face recognition model variants ───────────────────────────────────────
face_recog_scrfd_auraface      = 350   ; SCRFD-10G + AuraFace v1 (glintr100.onnx)
; ── Conversation mode models (mutually exclusive within mode) ─────────────
qwen_omni_7b                   = 7500  ; Qwen2.5-7B NVFP4: engine(5.6G) + KV(1.4G) + ctx(0.5G)
qwen_omni_3b                   = 2000  ; Qwen2.5-Omni-3B
gemma_e4b                      = 3000  ; Gemma 4 E4B — native audio+image input
tts                            = 100   ; TTS ONNX (Kokoro 82M, Dynamic INT8)
; ── CV extension (always-on, lightweight) ─────────────────────────────────
face_filter                    = 100   ; FaceMesh V2 ONNX + texture buffers
; ── SAM2 (on-demand, user-triggered segmentation) ─────────────────────────
sam2                           = 800   ; SAM2 Tiny ONNX image encoder + mask decoder
; ── Audio enhancement (optional toggle in Conversation mode) ──────────────
audio_denoise                  = 50    ; DTLN two-stage audio denoiser
; ── Security Camera mode ─────────────────────────────────────────────────
security_camera                = 250   ; YOLOv8-seg TRT engine (same as background_blur, separate process)
; ── Beauty mode (real-time face beautification) ──────────────────────────
beauty                         = 250   ; FaceMesh V2 ONNX + bilateral filter workspace + TPS warp buffers

; ===========================================================================
; §6c  VRAM INFERENCE HEADROOM — Minimum free VRAM before inference (MiB)
;
; Conservative estimates of peak activation memory beyond loaded model
; weights (workspace, KV cache growth, intermediate tensors).
; Used by ensureVramAvailableMiB() pre-flight checks in hot-path code.
; ===========================================================================

[vram_inference_headroom]
background_blur        = 64    ; YOLOv8-Seg TRT workspace (416×416)
face_recognition       = 128   ; SCRFD + AuraFace detection workspace
qwen_omni_7b           = 512   ; Unified STT+LLM+TTS activations + KV cache growth
qwen_omni_3b           = 300   ; Smaller model, less activation memory
gemma_e4b              = 400   ; Audio+image encoder activations + decoder workspace
tts                    = 64    ; ONNX Runtime intermediate tensors (Kokoro)
llm                    = 256   ; Standalone LLM KV cache growth + TRT workspace
stt                    = 200   ; Standalone STT encoder+decoder activations
face_filter            = 64    ; FaceMesh V2 ONNX workspace (192×192 input)
sam2                   = 256   ; SAM2 ViT encoder activations + mask decoder
audio_denoise          = 32    ; DTLN two-stage ONNX workspace
security_camera        = 64    ; YOLOv8-Seg TRT workspace (416×416, same as background_blur)
beauty                 = 64    ; FaceMesh V2 ONNX workspace (192×192 input) + kernel buffers

; ===========================================================================
; §6d  INTERACTION PROFILES — Priority maps for each GPU mode
;
; Priority scale: 0 = evict first, 5 = never evict.
; Within the same priority, largest VRAM budget is evicted first.
; Always-on modules (background_blur, face_recognition) should be 5
; in ALL profiles so they are never evicted.
; ===========================================================================

[profile_conversation]
conversation_model     = 5     ; Never evict — active conversation model
tts                    = 4     ; Spawned alongside Gemma 4 E4B only
audio_denoise          = 1     ; Optional toggle for speech cleanup
background_blur        = 3     ; Always-on — never evict
face_recognition       = 3     ; Always-on — never evict
sam2                   = 1     ; On-demand segmentation — keep if VRAM allows

[profile_vision_model]
conversation_model     = 5     ; Never evict — active VLM (Qwen Omni) using conversation_model slot
background_blur        = 0     ; Evict — not needed for VLM, reclaim 250 MiB
face_recognition       = 5     ; Always-on — never evict
tts                    = 0     ; Evict — Qwen Omni has native TTS
audio_denoise          = 0     ; Evict — no audio pipeline for VLM
sam2                   = 0     ; Evict — not active in vision model mode

[profile_sam2_segmentation]
sam2                   = 5     ; Never evict — active mode
background_blur        = 5     ; Always-on — never evict
face_recognition       = 5     ; Always-on — never evict
conversation_model     = 0     ; Evict — killed on mode switch
tts                    = 0     ; Evict — not active in SAM2 mode
audio_denoise          = 0     ; Evict — not active in SAM2 mode

[profile_security]
security_camera        = 5     ; Never evict — active mode primary module
background_blur        = 5     ; Always-on — never evict
video_ingest           = 5     ; Always-on — never evict
audio_ingest           = 5     ; Always-on — never evict
conversation_model     = 0     ; Evict — not needed in security mode
tts                    = 0     ; Evict — not needed in security mode
audio_denoise          = 0     ; Evict — not needed in security mode
face_recognition       = 0     ; Evict — not needed in security mode
sam2                   = 0     ; Evict — not active in security mode

[profile_beauty]
beauty                 = 5     ; Never evict — active mode primary module
background_blur        = 5     ; Always-on — never evict (also provides BG segmentation mask)
face_recognition       = 5     ; Always-on — never evict
video_ingest           = 5     ; Always-on — never evict
audio_ingest           = 5     ; Always-on — never evict
conversation_model     = 0     ; Evict — not needed in beauty mode
tts                    = 0     ; Evict — not needed in beauty mode
audio_denoise          = 0     ; Evict — not needed in beauty mode
sam2                   = 0     ; Evict — not active in beauty mode
security_camera        = 0     ; Evict — not active in beauty mode

[crash_protection]
max_segfault_restarts    = 1     ; SIGSEGV/SIGBUS restarts before permanent disable
memory_check_interval_ms = 2000  ; /proc/<pid>/statm polling interval (ms)
max_unresponsive_checks  = 10    ; Consecutive failed health checks before kill
kill_process_group       = 1     ; Kill entire process group, not just main PID

; ===========================================================================
; §7  GRAPH ORCHESTRATOR
; ===========================================================================
; Speech-to-text (Whisper via TensorRT-LLM) node-level config.
; Paths are models_root-relative.

[stt]
encoder_engine = whisper/encoder_fp16
decoder_engine = whisper/decoder_fp16
tokenizer_dir  = whisper/tokenizer
shm_input      = /oe.aud.ingest

[stt.hallucination_filter]
no_speech_prob_threshold = 0.6
min_avg_logprob          = -1.0
max_consecutive_repeats  = 3

; Conversation (LLM) node. Legacy Qwen keys still consumed by the
; conversation node pending Phase 11 migration to Gemma-4.

[conversation]
shm_input_audio = /oe.aud.ingest
shm_input_text  = /oe.conv.text
; TODO(phase-11): remove this key when Qwen is fully replaced by Gemma-4.
default_variant = qwen_omni_3b

; WebSocket bridge additional knobs beyond [websocket_bridge].frontend_dir.

[websocket_bridge.extra]
max_payload_bytes = 10485760
ping_interval_sec = 30

; Graph-based pipeline orchestrator (canonical). Profile switches are
; computed as graph diffs and executed as ordered switch plans.

[orchestrator_graph]
shadow_mode = true
drain_timeout_ms = 5000
connect_retry_count = 10
connect_retry_interval_ms = 500


; §8  LOGGING
; ===========================================================================

[logging]
; Valid: trace, debug, info, warn, err, critical, off
; "trace" requires SPDLOG_ACTIVE_LEVEL=0 at compile time.
default = trace

; Per-module overrides (uncomment to customize):
; video_ingest     = info
; audio_ingest     = info
; websocket_bridge = info
; background_blur  = info
; tts              = info
; stt              = info
; face_recognition = info
; llm              = debug
; video_denoise    = info
; audio_denoise    = info
; orchestrator     = info
