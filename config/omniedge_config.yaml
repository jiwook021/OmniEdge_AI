# ---------------------------------------------------------------------------
# OmniEdge_AI — Master Configuration
# ---------------------------------------------------------------------------
#
# ─── Model Paths ──────────────────────────────────────────────────────
# All model paths below are relative to models_root.
# Set models_root to your local model directory.
# Default: $HOME/omniedge_models (override via --models-root CLI flag
# or OE_MODELS_DIR environment variable)
# ---------------------------------------------------------------------------
models_root: "/opt/omniedge/models"

video_ingest:
  v4l2_device: "/dev/video0"
  frame_width: 1920
  frame_height: 1080
  shm_input: "/oe.vid.ingest"
  pub_port: 5555

audio_ingest:
  audio_source: "auto"                            # "auto" = local mic (PulseAudio/ALSA), "tcp" = Windows host stream, or file path
  windows_host_ip: "172.17.0.1"                  # only used when audio_source: "tcp"
  tcp_port: 5001                                 # only used when audio_source: "tcp"
  pub_port: 5556

screen_ingest:
  windows_host_ip: "host.docker.internal"         # Resolves to Windows host from container
  tcp_port: 5002                                  # oe_screen_capture.exe TCP server port
  pub_port: 5577
  health_timeout_sec: 5
  vad:
    model_path: "silero_vad.onnx"              # Silero VAD v5 — CPU-only stateful GRU; gates STT input
    threshold: 0.5
    silence_duration_ms: 800

# ---------------------------------------------------------------------------
# Four-Mode Architecture — GPU Inference Modes
# ---------------------------------------------------------------------------
#
# The system operates in four mutually exclusive GPU inference modes:
#
#   1. Conversation (default) — Qwen2.5-Omni-7B / 3B / Gemma 4 E4B
#      Handles STT+LLM+TTS in a single process (Qwen-Omni variants).
#      Gemma 4 E4B needs a companion TTS process.
#      Video conversation mode: all three models accept video frames from
#      /oe.vid.ingest when the user enables the camera toggle in the UI.
#
#   2. Super Resolution — BasicVSR++ temporal video enhancement
#
#   3. Image Transform — Stable Diffusion + ControlNet/IP-Adapter
#
# Always-on: video_ingest, audio_ingest, background_blur, ISP, ws_bridge
# ---------------------------------------------------------------------------

# ── Conversation Mode Models ─────────────────────────────────────────────
# The UI exposes a single model selector dropdown with three options.

conversation_models:
  # Qwen2.5-Omni-7B — multimodal (native STT + TTS + vision).
  # HuggingFace transformers (BF16). ~14 GB VRAM.
  qwen_omni_7b:
    model_dir: "qwen2.5-omni-7b"
    quantization: "bf16"
    max_context_tokens: 2048
    vram_budget_mib: 14000
    native_stt: true
    native_tts: true
    native_vision: true
    zmq_pub_port: 5572
    fallback: "qwen_omni_3b"    # Auto-downgrade target when VRAM insufficient

  # Qwen2.5-Omni-3B — lighter multimodal (native STT + TTS + vision).
  # HuggingFace transformers (BF16). ~6 GB VRAM. Fastest.
  qwen_omni_3b:
    model_dir: "qwen2.5-omni-3b"
    quantization: "bf16"
    max_context_tokens: 2048
    vram_budget_mib: 6000
    native_stt: true
    native_tts: true
    native_vision: true
    zmq_pub_port: 5572
    fallback: "gemma_e4b"       # Auto-downgrade target when VRAM insufficient

  # Gemma 4 E4B — multimodal MoE (STT + vision, no native TTS).
  # Runs via HuggingFace transformers (BF16). ~8 GB active (15 GB total, sparse MoE).
  gemma_e4b:
    model_dir: "gemma-4-e4b"
    quantization: "bf16"
    max_context_tokens: 4096
    vram_budget_mib: 8000
    native_stt: true
    native_tts: false          # No audio output — needs companion TTS (Kokoro)
    native_vision: true
    zmq_pub_port: 5572
    fallback: ""                # Terminal — no further downgrade

# Active conversation model at boot (one of: qwen_omni_7b, qwen_omni_3b, gemma_e4b)
default_conversation_model: "qwen_omni_3b"

# ── TTS (companion for Gemma 4 E4B only) ─────────────────────────────────
# When Gemma 4 E4B is selected, the UI reveals an additional TTS model selector.
tts:
  onnx_model: "kokoro-onnx/onnx/model_int8.onnx"  # Kokoro v1.0 INT8 ONNX — 82M param TTS; <100 MB VRAM
  voice_dir: "kokoro/voices"
  default_voice: "af_heart"
  speed: 1.0
  shm_output: "/oe.aud.tts"
  zmq_pub_port: 5565

background_blur:
  engine_path: "trt_engines/yolov8n-seg.engine"  # YOLOv8n-seg TRT FP16 engine — 3.2M param; ~0.25 GB VRAM (416×416 input)
  input_size: 416                                     # Input resolution for TRT engine (must match engine build)
  shm_input: "/oe.vid.ingest"
  shm_output: "/oe.cv.blur.jpeg"
  jpeg_quality: 85
  blur_kernel_size: 51
  blur_sigma: 25.0
  cuda_stream_priority: 0
  zmq_pub_port: 5567

face_recognition:
  # Single supported variant: scrfd_auraface_v1 (SCRFD-10G + AuraFace v1 / glintr100).
  model_variant: "scrfd_auraface_v1"
  # Directory containing detector.onnx + recognizer.onnx.
  # recognizer.onnx is auto-downloaded from fal/AuraFace-v1 on first run.
  model_pack_path: "face_models/scrfd_auraface"
  shm_input: "/oe.vid.ingest"
  recognition_threshold: 0.45
  faces_db: "./data/known_faces.sqlite"
  frame_subsample: 3
  cuda_stream_priority: 0
  zmq_pub_port: 5566

face_filter:
  model_path: "facemesh/face_landmarks_detector.onnx"  # FaceMesh V2 ONNX — 478 3D landmarks; ~30 MB VRAM
  filter_manifest: "assets/filters/manifest.json"       # Filter asset manifest (textures + UV maps)
  shm_input: "/oe.vid.ingest"
  shm_output: "/oe.cv.facefilter.jpeg"
  jpeg_quality: 85
  active_filter: ""                                     # Empty = passthrough at boot
  enabled: false                                        # Disabled until user toggles on
  cuda_stream_priority: 0
  zmq_pub_port: 5575

# ---------------------------------------------------------------------------
# SAM2 — Segment Anything Model 2 (interactive segmentation)
# ---------------------------------------------------------------------------
# On-demand module: user clicks a point or draws a box on the video canvas,
# SAM2 produces a pixel-perfect segmentation mask. Two-stage ONNX inference:
# image encoder (ViT backbone, ~700 MiB) + mask decoder (lightweight, ~20ms).
# VRAM: ~800 MiB total. Spawned on first use, unloaded on mode switch.

sam2:
  encoder_model: "sam2/sam2_hiera_tiny_encoder.onnx"
  decoder_model: "sam2/sam2_hiera_tiny_decoder.onnx"
  shm_input: "/oe.vid.ingest"
  shm_output: "/oe.cv.sam2.mask"
  jpeg_quality: 90
  enabled: false
  cuda_stream_priority: 0
  zmq_pub_port: 5576

# ---------------------------------------------------------------------------
# Audio denoise — optional toggle in Conversation mode
# ---------------------------------------------------------------------------
# When enabled, inserts an audio cleanup stage in the pipeline before the
# conversation model receives audio input, reducing background noise for
# more accurate speech understanding.

audio_denoise:
  model_stage1: "dtln/dtln_1.onnx"  # DTLN stage-1 — STFT domain LSTM masking; ~2.5 MB
  model_stage2: "dtln/dtln_2.onnx"  # DTLN stage-2 — time domain waveform refinement; ~2.5 MB
  shm_input: "/oe.aud.ingest"
  shm_output: "/oe.aud.denoise"
  cuda_stream_priority: 0
  zmq_pub_port: 5569

websocket_bridge:
  ws_port: 9001
  frontend_dir: "/opt/omniedge/share/frontend"
  zmq_pub_port: 5570

daemon:
  zmq_pub_port: 5571
  watchdog_poll_ms: 1000
  module_ready_timeout_s: 180
  restart_base_backoff_ms: 500
  restart_max_backoff_ms: 30000
  state_machine:
    vad_silence_threshold_ms: 800
    barge_in_enabled: true
    llm_generation_timeout_s: 60
  heartbeat:
    ivl_ms: 1000
    timeout_ms: 30000
    ttl_ms: 10000
  zmq_sub:
    - "ipc:///tmp/omniedge_5570"   # ws_bridge
    - "ipc:///tmp/omniedge_5555"   # video_ingest
    - "ipc:///tmp/omniedge_5556"   # audio_ingest
    - "ipc:///tmp/omniedge_5565"   # tts
    - "ipc:///tmp/omniedge_5566"   # face_recognition
    - "ipc:///tmp/omniedge_5567"   # background_blur
    - "ipc:///tmp/omniedge_5569"   # audio_denoise
    - "ipc:///tmp/omniedge_5572"   # conversation_model (Qwen-Omni / Gemma)
    - "ipc:///tmp/omniedge_5575"   # face_filter (FaceMesh AR)
    - "ipc:///tmp/omniedge_5576"   # sam2 (Segment Anything Model 2)
    - "ipc:///tmp/omniedge_5577"   # screen_ingest

# ---------------------------------------------------------------------------
# Module definitions — daemon looks up modules[name].binary + args
# ---------------------------------------------------------------------------
#
# Four-mode architecture:
#   Always-on:  video_ingest, audio_ingest, background_blur, ws_bridge
#   Conversation (default): conversation_model (unified STT+LLM+TTS)
#   On-demand (UI toggle): tts (Gemma companion), audio_denoise
#   CV:        face_recognition, face_filter, sam2
# ---------------------------------------------------------------------------
modules:
  # ── Always-on modules (resident across ALL modes) ──────────────────────
  ws_bridge:
    binary: "/opt/omniedge/bin/omniedge_ws_bridge"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5570"
    max_restarts: 5

  video_ingest:
    binary: "/opt/omniedge/bin/omniedge_video_ingest"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5555"
    max_restarts: 5

  audio_ingest:
    binary: "/opt/omniedge/bin/omniedge_audio_ingest"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5556"
    max_restarts: 5

  # Screen ingest — on-demand, spawned when user toggles screen sharing.
  # Connects to Windows oe_screen_capture.exe TCP server on host.
  screen_ingest:
    binary: "/opt/omniedge/bin/omniedge_screen_ingest"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5577"
    max_restarts: 5

  background_blur:
    binary: "/opt/omniedge/bin/omniedge_bg_blur"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5567"
    max_restarts: 5

  # ── Conversation mode — unified model (default: Qwen2.5-Omni-7B) ──────
  # Both Qwen 2.5-Omni variants handle STT+LLM+TTS natively in a single
  # process — no separate STT or TTS modules are spawned.
  # Gemma 4 E4B accepts audio+image natively but needs companion TTS.
  # Switching between conversation models follows the same kill-spawn cycle.
  conversation_model:
    binary: "/opt/omniedge/bin/omniedge_conversation"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml", "--model", "qwen_omni_3b"]
    zmq_pub: "ipc:///tmp/omniedge_5572"
    max_restarts: 3
    env:
      CUDA_VISIBLE_DEVICES: "0"

  # TTS companion — only spawned when Gemma 4 E4B is selected
  tts:
    binary: "/opt/omniedge/bin/omniedge_tts"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5565"
    max_restarts: 3

  # Audio denoise — optional toggle in Conversation mode
  audio_denoise:
    binary: "/opt/omniedge/bin/omniedge_audio_denoise"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5569"
    max_restarts: 3

  # ── Face filter AR (always-on, lightweight) ─────────────────────────────
  face_filter:
    binary: "/opt/omniedge/bin/omniedge_face_filter"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5575"
    max_restarts: 5

  # ── SAM2 interactive segmentation (on-demand, user-triggered) ────────
  sam2:
    binary: "/opt/omniedge/bin/omniedge_sam2"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5576"
    max_restarts: 3
    env:
      CUDA_VISIBLE_DEVICES: "0"

  # ── CV extension modules ────────────────────────────────────────────────
  face_recognition:
    binary: "/opt/omniedge/bin/omniedge_face_recog"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5566"
    max_restarts: 5

  video_denoise:
    binary: "/opt/omniedge/bin/omniedge_video_denoise"
    args: ["--config", "/opt/omniedge/etc/omniedge_config.yaml"]
    zmq_pub: "ipc:///tmp/omniedge_5568"
    max_restarts: 3
    env:
      CUDA_VISIBLE_DEVICES: "0"

# ---------------------------------------------------------------------------
# Launch Order — daemon spawns these modules at boot in this order
# ---------------------------------------------------------------------------
#
# Always-on modules launch at boot.  The default conversation model
# (Qwen2.5-Omni-7B) launches as the initial heavy GPU process.
# Super Resolution, Image Transform, and companion TTS are NOT in
# launch_order — they are spawned on-demand via mode switch or UI toggle.
#
# ws_bridge is NOT listed — run_all.sh launches it separately.
launch_order:
  - video_ingest
  - audio_ingest
  - conversation_model
  - background_blur

# Mode-specific launch orders.
# "simple_llm" boots fast with text-only conversation.
# "full_conversation" adds all A/V ingest + background blur.
# The daemon reads default_mode from omniedge.ini and uses the matching list.
boot_modes:
  simple_llm:
    - conversation_model
  full_conversation:
    - video_ingest
    - audio_ingest
    - conversation_model
    - background_blur
